# ── DataSource ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/hospital_db?allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Ririri1231
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── JSP View Resolver ────────────────────────────────────────────────
spring.mvc.view.prefix=/WEB-INF/templates/
spring.mvc.view.suffix=.jsp

# ── Static Resources (CSS/JS served at /css/**, /js/**) ─────────────
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ── JWT ──────────────────────────────────────────────────────────────
app.jwt.secret=yourSecretKeyHereMakeItLongAndSecure1234567890
app.jwt.expiration.ms=86400000
app.jwt.refresh.expiration.ms=604800000

# ── Server ───────────────────────────────────────────────────────────
server.port=8080

# ── Logging ──────────────────────────────────────────────────────────
logging.level.com.hospital=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
